<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Zyrova</title>
  <meta name="description" content="View product details on Zyrova.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Zyrova Home">
        <img src="Brand_logo.jpg" alt="Zyrova Logo" onerror="this.style.display='none'">
        <span class="nav-logo-text">Zyrova</span>
      </a>
      <div class="nav-search" role="search">
        <input type="search" id="nav-search-input" placeholder="Search products…" aria-label="Search products" autocomplete="off">
        <button class="nav-search-btn" aria-label="Search" onclick="window.location.href='index.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
      </div>
      <div class="nav-actions">
        <a href="wishlist.html" class="nav-icon-btn" aria-label="Wishlist">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span class="nav-badge wish-badge" style="display:none">0</span>
        </a>
        <a href="cart.html" class="nav-icon-btn" aria-label="Shopping cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="nav-badge cart-badge" style="display:none">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- ── PAGE CONTENT ───────────────────────────────── -->
  <main class="page-content">
    <div class="product-detail container">
      <!-- Dynamically rendered by script.js -->
      <div id="product-detail"></div>
    </div>
  </main>

  <!-- ── FOOTER ──────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-logo">
        <img src="Brand_logo.jpg" alt="Zyrova" onerror="this.style.display='none'">
        Zyrova
      </div>
      <div class="footer-copy">© 2026 Zyrova. All rights reserved.</div>
      <nav class="footer-links" aria-label="Footer links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Support</a>
      </nav>
    </div>
  </footer>

  <div id="toast-container" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
